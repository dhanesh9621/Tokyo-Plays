<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokyo Plays</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 2rem;
      color: #00f7ff;
      text-shadow: 0 0 10px #00f7ff;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00f7ff;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .title {
      padding: 10px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: bold;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <h1>🎮 Tokyo Plays</h1>

  <div class="container">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1605902711622-cfb43c44367f" alt="">
      <div class="title">GTA V</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db" alt="">
      <div class="title">Cyberpunk 2077</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1611605698335-8b1569810432" alt="">
      <div class="title">Black Myth: Wukong</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf" alt="">
      <div class="title">Red Dead Redemption 2</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e" alt="">
      <div class="title">Call of Duty Warzone</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420" alt="">
      <div class="title">God of War</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1598550476439-6847785fcea6" alt="">
      <div class="title">Elden Ring</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1580128637393-cc4ffb4fbc56" alt="">
      <div class="title">Spider-Man</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf" alt="">
      <div class="title">Assassin's Creed Valhalla</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1627856013091-fed6e4e30025" alt="">
      <div class="title">Forza Horizon 5</div>
    </div>

  </div>

</body>
</html>
